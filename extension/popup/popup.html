<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header class="top">
    <div class="brand">
      <img src="../icons/48.png" width="22" height="22" alt="" />
      <span>NetLens</span>
    </div>
    <span class="site" id="site">—</span>
  </header>

  <div class="app" id="app">
    <div class="empty" id="empty">No requests captured yet.<br /><small>Open or reload a page, then reopen NetLens.</small></div>
  </div>

  <footer class="foot">
    <button class="btn" id="report">Open full report ↗</button>
    <div class="foot__row">
      <button class="btn btn--ghost" id="export">Export JSON</button>
      <button class="btn btn--ghost" id="refresh">Reload</button>
    </div>
    <div class="rate" id="rate" hidden>
      <span class="rate__txt">Enjoying NetLens?</span>
      <a class="rate__cta" id="rate-link" href="https://chromewebstore.google.com/detail/netlens-%E2%80%94-network-analyze/keambnkanebbfnmhlkffmfdbgnnflobe/reviews" target="_blank" rel="noopener">Rate it ★</a>
      <button class="rate__x" id="rate-x" title="Dismiss" aria-label="Dismiss">✕</button>
    </div>
    <div class="foot__brand">
      <span class="foot__status"><span class="foot__dot"></span> Runs 100% locally — nothing leaves your browser</span>
      <a class="foot__logo" href="https://toolwizhub.com" target="_blank" rel="noopener" title="ToolWizHub">
        <img src="../assets/toolwizhub-logo.webp" alt="ToolWizHub" width="64" />
      </a>
    </div>
  </footer>

  <script type="module" src="popup.js"></script>
</body>
</html>
